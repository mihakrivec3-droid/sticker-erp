<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker ERP | Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { display: none; }
        .screen.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #f97316; }
        input:checked + .slider:before { transform: translateX(26px); }
        input:disabled { background-color: #f1f5f9; color: #94a3b8; border-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24 font-sans text-slate-900">

    <nav class="bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 onclick="showScreen('main-menu')" class="font-black italic text-orange-400 text-2xl cursor-pointer uppercase">Sticker Log</h1>
                <div onclick="showScreen('admin')" class="bg-orange-500 px-3 py-1 rounded text-[10px] font-bold uppercase cursor-pointer">Admin Panel</div>
            </div>
            <div class="grid grid-cols-3 gap-2 bg-white/5 p-3 rounded-xl border border-white/10">
                <div class="text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-bold">Prihodek</p>
                    <p id="dash-prihodek" class="text-emerald-400 font-black text-sm">0 €</p>
                </div>
                <div class="text-center border-x border-white/10">
                    <p class="text-[9px] uppercase text-slate-400 font-bold">Stroški</p>
                    <p id="dash-stroski" class="text-red-400 font-black text-sm">0 €</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-bold">Profit</p>
                    <p id="dash-profit" class="text-orange-400 font-black text-sm">0 €</p>
                </div>
            </div>
        </div>
    </nav>

    <div id="main-menu" class="screen active p-6 space-y-4 max-w-md mx-auto italic font-bold">
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showScreen('posiljka')" class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-blue-600 active:scale-95 transition text-left text-blue-600">
                <span class="text-3xl block mb-2">📦</span> POŠILJKA
            </button>
            <button onclick="showScreen('prodaja')" class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-emerald-500 active:scale-95 transition text-left text-emerald-600">
                <span class="text-3xl block mb-2">💰</span> PRODAJA
            </button>
            <button onclick="showScreen('nabava')" class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-purple-500 active:scale-95 transition text-left col-span-2 text-purple-600">
                <span class="text-3xl mr-2">🚚</span> NABAVA DOBAVITELJ
            </button>
            <button onclick="showScreen('zaloga')" class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-orange-500 active:scale-95 transition text-left col-span-2 text-orange-600">
                <span class="text-3xl mr-2">📊</span> STANJE ZALOGE
            </button>
        </div>
    </div>

    <div id="prodaja" class="screen p-6 max-w-md mx-auto">
        <button onclick="showScreen('main-menu')" class="mb-4 text-slate-400 font-bold uppercase text-xs italic">← Nazaj</button>
        <h2 class="text-2xl font-black mb-6 uppercase text-emerald-600 italic">Prodaja</h2>
        <select id="sel-trg-pro" class="w-full p-4 bg-white rounded-xl mb-6 shadow-sm font-bold border-2 border-slate-200 italic"></select>
        <div class="bg-emerald-50 p-8 rounded-3xl border-2 border-emerald-200 mb-8 text-center text-emerald-600 italic">
            <p class="text-[10px] font-bold uppercase mb-2">Vpiši število prodanih nalepk:</p>
            <input type="number" id="input-prodaja-total" class="text-7xl font-black w-full text-center outline-none bg-transparent" placeholder="0">
        </div>
        <button id="btn-save-pro" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase">Zabeleži prodajo</button>
    </div>

    <div id="posiljka" class="screen p-6 max-w-md mx-auto">
        <button onclick="showScreen('main-menu')" class="mb-4 text-slate-400 font-bold uppercase text-xs italic">← Nazaj</button>
        <h2 class="text-2xl font-black mb-4 uppercase italic text-blue-600">Pošiljka</h2>
        <select id="sel-trg-pos" class="w-full p-4 bg-white rounded-xl mb-6 shadow-sm font-bold border-2 border-slate-200 italic"></select>
        <div id="posiljka-list" class="space-y-2 mb-28"></div>
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t z-50">
            <button id="btn-save-pos" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Pošlji v trgovino</button>
        </div>
    </div>

    <div id="nabava" class="screen p-6 max-w-md mx-auto">
        <button onclick="showScreen('main-menu')" class="mb-4 text-slate-400 font-bold uppercase text-xs italic">← Nazaj</button>
        <h2 class="text-2xl font-black mb-4 uppercase italic text-purple-600">Nabava</h2>
        <div class="bg-purple-100 p-4 rounded-xl mb-6 border border-purple-200 italic">
            <label class="block text-[10px] font-bold text-purple-600 uppercase mb-1">Skupni strošek računa (€):</label>
            <input type="number" id="nabava-cena" step="0.01" class="w-full p-3 rounded-lg font-black text-xl outline-none" placeholder="0.00">
        </div>
        <div id="nabava-list" class="space-y-2 mb-28"></div>
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t z-50">
            <button id="btn-save-nabava" class="w-full bg-purple-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase text-sm">Vnesi v skladišče</button>
        </div>
    </div>

    <div id="zaloga" class="screen p-6 max-w-md mx-auto">
        <button onclick="showScreen('main-menu')" class="mb-4 text-slate-400 font-bold uppercase text-xs italic">← Nazaj</button>
        <h2 class="text-2xl font-black mb-4 uppercase italic text-orange-600">Skladišče</h2>
        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-200">
            <table class="w-full text-left">
                <tbody id="inventory-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="admin" class="screen p-6 max-w-md mx-auto pb-32">
        <button onclick="showScreen('main-menu')" class="mb-4 text-slate-400 font-bold uppercase text-xs italic">← Zapri</button>
        
        <div class="flex justify-between items-center bg-white p-4 rounded-xl mb-8 shadow-sm border border-orange-100 italic">
            <div>
                <p class="font-black uppercase text-xs text-orange-600">Način urejanja</p>
                <p class="text-[10px] text-slate-400">Vklopi za urejanje cen in zaloge</p>
            </div>
            <label class="switch">
                <input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="space-y-8">
            <section>
                <h3 class="font-black text-slate-500 uppercase text-xs mb-3 border-l-4 border-orange-500 pl-2">Cenik (€)</h3>
                <div id="admin-cenik-list" class="space-y-1 bg-white p-2 rounded-xl border"></div>
            </section>
            <section>
                <h3 class="font-black text-slate-500 uppercase text-xs mb-3 border-l-4 border-blue-500 pl-2">Ročna inventura</h3>
                <div id="admin-inventura-list" class="space-y-1 bg-white p-2 rounded-xl border"></div>
            </section>
            <section>
                <h3 class="font-black text-slate-500 uppercase text-xs mb-3 border-l-4 border-slate-400 pl-2">Zgodovina</h3>
                <div id="admin-log-list" class="space-y-2"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, increment, collection, addDoc, query, orderBy, limit, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDb8ny-gDdJUm0JBpyci_k-JboUYoM6ZhQ",
            authDomain: "zaloga-nalepk.firebaseapp.com",
            projectId: "zaloga-nalepk",
            storageBucket: "zaloga-nalepk.firebasestorage.app",
            messagingSenderId: "151945982503",
            appId: "1:151945982503:web:68faa4699b14d3f8e69402",
            measurementId: "G-VCK6RCNSEH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const nalepke = ["Bled", "Triglav", "Ljubljana", "Zmajski most", "Beljski vintgar", "Bovec", "Predjamski grad", "Postojnska jama", "Bohinj", "Piran", "Kranjska Gora", "Slovenija", "Planica WR", "Planica NC", "Srbija", "Novi Sad", "Okno", "Srce"];
        const trgovine = ["Souvenirs LJ", "Pik Pok Bled", "NC Planica", "TD Bled", "Unikatnica", "Postojnska jama privat", "Souvenirs NS", "Zakladi Triglav", "Zakladi Zaka Bled", "Stojnica Bovec"];

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'zaloga') loadZaloga();
            if(id === 'admin') { loadLog(); loadCenik(); loadInventura(); }
        };

        // --- DASHBOARD REALTIME ---
        onSnapshot(collection(db, "transakcije"), (snap) => {
            let pr = 0, st = 0;
            snap.forEach(d => {
                const data = d.data();
                if(data.tip === "Prodaja") pr += (data.znesek || 0);
                if(data.tip === "Nabava") st += (data.strosek || 0);
            });
            document.getElementById('dash-prihodek').innerText = pr.toFixed(2) + " €";
            document.getElementById('dash-stroski').innerText = st.toFixed(2) + " €";
            document.getElementById('dash-profit').innerText = (pr - st).toFixed(2) + " €";
        });

        // --- UI RENDER LISTS ---
        const nList = document.getElementById('nabava-list');
        const pList = document.getElementById('posiljka-list');
        const trgPro = document.getElementById('sel-trg-pro');
        const trgPos = document.getElementById('sel-trg-pos');

        trgovine.forEach(t => {
            trgPro.innerHTML += `<option value="${t}">${t}</option>`;
            trgPos.innerHTML += `<option value="${t}">${t}</option>`;
        });

        nalepke.forEach(n => {
            const row = `<div class="flex items-center justify-between bg-white p-3 rounded-xl border">
                <span class="font-bold text-xs italic text-slate-500 uppercase">${n}</span>
                <input type="number" data-name="${n}" class="w-20 p-2 bg-slate-50 rounded text-center font-black outline-none border" placeholder="0">
            </div>`;
            nList.innerHTML += row;
            pList.innerHTML += row;
        });

        // --- LOGIKA SHRANJEVANJA ---
        document.getElementById('btn-save-pro').onclick = async () => {
            const kol = parseInt(document.getElementById('input-prodaja-total').value);
            if(!kol) return;
            const trg = trgPro.value;
            const set = await getDoc(doc(db, "nastavitve", "cenik"));
            const cena = set.exists() ? (set.data()[trg] || 0) : 0;
            const znesek = kol * cena;
            await addDoc(collection(db, "transakcije"), { tip: "Prodaja", trgovina: trg, znesek, kolicina: kol, datum: new Date() });
            alert("Zapisano!"); location.reload();
        };

        document.getElementById('btn-save-nabava').onclick = async () => {
            const strosek = parseFloat(document.getElementById('nabava-cena').value) || 0;
            const updates = {};
            let total = 0;
            document.querySelectorAll('#nabava-list input').forEach(inp => {
                const v = parseInt(inp.value);
                if(v > 0) { updates[inp.dataset.name] = increment(v); total += v; }
            });
            if(total > 0) {
                await updateDoc(doc(db, "zaloga", "glavno_skladisce"), updates);
                await addDoc(collection(db, "transakcije"), { tip: "Nabava", strosek, kolicina: total, datum: new Date() });
                alert("Skladišče posodobljeno!"); location.reload();
            }
        };

        document.getElementById('btn-save-pos').onclick = async () => {
            const updates = {};
            let total = 0;
            document.querySelectorAll('#posiljka-list input').forEach(inp => {
                const v = parseInt(inp.value);
                if(v > 0) { updates[inp.dataset.name] = increment(-v); total += v; }
            });
            if(total > 0) {
                await updateDoc(doc(db, "zaloga", "glavno_skladisce"), updates);
                await addDoc(collection(db, "transakcije"), { tip: "Posiljka", trgovina: trgPos.value, kolicina: total, datum: new Date() });
                alert("Poslano!"); location.reload();
            }
        };

        // --- ADMIN FUNKCIJE ---
        window.toggleEditMode = () => {
            const isEditing = document.getElementById('edit-mode-toggle').checked;
            document.querySelectorAll('.admin-edit-input').forEach(inp => inp.disabled = !isEditing);
        };

        async function loadCenik() {
            const div = document.getElementById('admin-cenik-list');
            const snap = await getDoc(doc(db, "nastavitve", "cenik"));
            const data = snap.exists() ? snap.data() : {};
            div.innerHTML = "";
            trgovine.forEach(t => {
                div.innerHTML += `<div class="flex items-center justify-between p-2 border-b last:border-0 italic">
                    <span class="text-[10px] font-bold text-slate-600 uppercase">${t}</span>
                    <input type="number" step="0.01" class="admin-edit-input w-16 p-1 border rounded text-right font-black text-xs" value="${data[t] || 0}" disabled onchange="updateCena('${t}', this.value)">
                </div>`;
            });
        }
        window.updateCena = async (trg, val) => { await setDoc(doc(db, "nastavitve", "cenik"), { [trg]: parseFloat(val) }, { merge: true }); };

        async function loadInventura() {
            const div = document.getElementById('admin-inventura-list');
            const snap = await getDoc(doc(db, "zaloga", "glavno_skladisce"));
            const data = snap.exists() ? snap.data() : {};
            div.innerHTML = "";
            nalepke.forEach(n => {
                div.innerHTML += `<div class="flex items-center justify-between p-2 border-b last:border-0 italic">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">${n}</span>
                    <input type="number" class="admin-edit-input w-16 p-1 border rounded text-right font-black text-blue-600 text-xs" value="${data[n] || 0}" disabled onchange="updateZaloga('${n}', this.value)">
                </div>`;
            });
        }
        window.updateZaloga = async (n, val) => { await setDoc(doc(db, "zaloga", "glavno_skladisce"), { [n]: parseInt(val) }, { merge: true }); };

        async function loadLog() {
            const list = document.getElementById('admin-log-list');
            const q = query(collection(db, "transakcije"), orderBy("datum", "desc"), limit(10));
            const snap = await getDocs(q);
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="bg-white p-2 rounded shadow-sm text-[9px] flex justify-between italic uppercase font-bold">
                    <span>${data.tip} - ${data.trgovina || 'Nabava'} (${data.kolicina || 0} kos)</span>
                    <button onclick="window.deleteLog('${d.id}')" class="text-red-500 border border-red-200 px-2 rounded">BRISI</button>
                </div>`;
            });
        }

        // POPRAVLJENO BRISANJE
        window.deleteLog = async (id) => {
            if(confirm("Izbrišem ta zapis iz Firestore baze?")) {
                try {
                    await deleteDoc(doc(db, "transakcije", id));
                    alert("Zapis izbrisan.");
                    loadLog(); // Osveži seznam brez reloada
                } catch (e) {
                    alert("Napaka pri brisanju: " + e.message);
                }
            }
        };

        async function loadZaloga() {
            const table = document.getElementById('inventory-table-body');
            const snap = await getDoc(doc(db, "zaloga", "glavno_skladisce"));
            table.innerHTML = "";
            if(snap.exists()){
                const d = snap.data();
                nalepke.forEach(n => {
                    table.innerHTML += `<tr class="border-b italic"><td class="p-4 font-bold text-slate-500 text-xs uppercase tracking-tighter">${n}</td><td class="p-4 text-right font-black text-blue-600 text-lg">${d[n] || 0}</td></tr>`;
                });
            }
        }

        window.onload = () => { showScreen('main-menu'); };
    </script>
</body>
</html>
